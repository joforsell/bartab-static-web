<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWT1359JT0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FWT1359JT0');
    </script>
    <title>Transaction History - Bartab</title>
    <meta name="description" content="View your Bartab transaction history: purchases, balance changes, and running tab details. Access via your personal link from the app.">
    <link rel="canonical" href="https://bartab.info/history/">
    <meta name="robots" content="noindex, nofollow">
    <link rel="shortcut icon" type="image/x-icon" href="../static/favicon.png">
    <meta name="apple-itunes-app" content="app-id=1602993704">
    <meta property="og:image" content="https://bartab.info/static/og/og-history.png">
    <meta property="og:logo" content="https://bartab.info/static/app-icon.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bartab.info/static/og/og-history.png">
    <link rel="stylesheet" href="../static/main.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="../index.html" class="nav__logo">Bartab</a>
            <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <ul class="nav__links">
                <li><a href="../index.html" class="nav__link" data-i18n="nav.home">Home</a></li>
                <li><a href="../app.html" class="nav__link" data-i18n="nav.download">Download</a></li>
                <li id="lang-switcher"></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="history">
            <div class="container">
                <div class="history__header">
                    <h1 data-i18n="history.title">Transaction history</h1>
                    <p data-i18n="history.subtitle">Your purchases and balance changes</p>
                </div>

                <div id="content">
                    <div class="loading">
                        <div class="loading__spinner"></div>
                        <p data-i18n="history.loading">Loading transactions...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <div class="container">
            <div class="footer__links">
                <a href="../termsandconditions.html" class="footer__link" data-i18n="footer.terms">Terms & Conditions</a>
                <a href="../privacypolicy.html" class="footer__link" data-i18n="footer.privacy">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <script src="../static/i18n.js"></script>
    <script>
        // Mobile menu toggle
        const toggle = document.querySelector('.nav__toggle');
        const navLinks = document.querySelector('.nav__links');
        
        toggle.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            navLinks.classList.toggle('active');
        });

        // Icon mapping for imageName to SVG files
        const iconMap = {
            // Drinks
            'beer': 'beer.svg',
            'beermug': 'beermug.svg',
            'wine': 'wine.svg',
            'winetaster': 'winetaster.svg',
            'whiskey': 'whiskey.svg',
            'shot': 'shot.svg',
            'cocktail': 'cocktail.svg',
            'cocktail2': 'cocktail2.svg',
            'martini': 'martini.svg',
            'gintonic': 'gintonic.svg',
            'firecocktail': 'firecocktail.svg',
            'coffee': 'coffee.svg',
            'tea': 'tea.svg',
            'teacup': 'teacup.svg',
            'hotchocolate': 'hotchocolate.svg',
            'smoothie': 'smoothie.svg',
            'fruitjuice': 'fruitjuice.svg',
            'energydrink': 'energydrink.svg',
            'colddrink': 'colddrink.svg',
            'coconutdrink': 'coconutdrink.svg',
            'glasswithstraw': 'glasswithstraw.svg',
            'glass': 'glass.svg',
            'drink': 'drink.svg',
            // Food
            'chicken': 'chicken.svg',
            'chips': 'chips.svg',
            'fish': 'fish.svg',
            'fries': 'fries.svg',
            'fruit': 'fruit.svg',
            'hamburger': 'hamburger.svg',
            'hot-dog': 'hot-dog.svg',
            'pizza': 'pizza.svg',
            'pokebowl': 'pokebowl.svg',
            'sandwich': 'sandwich.svg',
            'spaghetti': 'spaghetti.svg',
            'steak': 'steak.svg',
            'taco': 'taco.svg',
            // Balance operations
            'addedBalance': 'addedBalance.svg',
            'removedBalance': 'removedBalance.svg',
            'openingBalance': 'addedBalance.svg'
        };

        function getIconPath(imageName, type) {
            if (type === 'add') {
                return '../static/addedBalance.svg';
            }
            if (type === 'remove') {
                return '../static/removedBalance.svg';
            }
            if (type === 'resolve') {
                return '../static/resolve.svg';
            }

            const iconFile = iconMap[imageName];
            if (iconFile) {
                return `../static/${iconFile}`;
            }

            return '../static/drink.svg';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return date.toLocaleDateString('en-US', options);
        }

        function formatAmount(amount, currency) {
            const prefix = amount > 0 ? '+' : amount < 0 ? '−' : '';
            const formatted = new Intl.NumberFormat(navigator.language, {
                style: 'currency',
                currency: currency
            }).format(Math.abs(amount));
            return `${prefix}${formatted}`;
        }

        function calculateBalance(transactions) {
            return transactions.reduce((sum, t) => sum + t.amount, 0);
        }

        function renderTransactions(transactions, currency, isDemo) {
            const content = document.getElementById('content');
            var tr = (window.__i18n && window.__i18n.t) ? window.__i18n.t.bind(window.__i18n) : function(k, p) { return (p && p.count != null) ? k + ' ' + p.count : k; };
            if (!transactions || transactions.length === 0) {
                content.innerHTML = '<div class="empty-state"><div class="empty-state__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div><h2>' + tr('history.empty_title') + '</h2><p>' + tr('history.empty_subtitle') + '</p></div>';
                return;
            }

            // Transactions are already sorted by the backend (newest first)
            // Group by same timestamp
            const groups = [];
            for (const t of transactions) {
                if (groups.length > 0 && groups[groups.length - 1][0].date === t.date) {
                    groups[groups.length - 1].push(t);
                } else {
                    groups.push([t]);
                }
            }

            const balance = calculateBalance(transactions);
            const balanceClass = balance >= 0 ? 'summary-card__balance--positive' : 'summary-card__balance--negative';

            const formattedBalance = new Intl.NumberFormat(navigator.language, {
                style: 'currency',
                currency: currency
            }).format(Math.abs(balance));

            const demoBanner = isDemo ? '<div class="demo-banner" role="status" aria-live="polite"><span class="demo-banner__label">' + tr('history.demo_label') + '</span><span class="demo-banner__text">' + tr('history.demo_text') + '</span></div>' : '';

            var txLabel = transactions.length === 1 ? tr('history.transaction') : tr('history.transactions');
            let html = demoBanner +
                '<div class="summary-card">' +
                '<div class="summary-card__label">' + tr('history.current_balance') + '</div>' +
                '<div class="summary-card__balance ' + balanceClass + '">' + formattedBalance + '</div>' +
                '<div class="summary-card__count">' + transactions.length + ' ' + txLabel + '</div>' +
                '</div><div class="transaction-list">';

            let runningBalance = balance;

            for (const group of groups) {
                const groupTotal = group.reduce((sum, t) => sum + t.amount, 0);
                const balanceAfter = runningBalance;
                runningBalance -= groupTotal;

                const balanceValue = Math.abs(balanceAfter) < 0.001 ? 0 : balanceAfter;
                const formattedRunningBalance = new Intl.NumberFormat(navigator.language, {
                    style: 'currency',
                    currency: currency
                }).format(balanceValue);

                if (group.length === 1) {
                    const t = group[0];
                    const isResolved = t.resolvedBy && t.resolvedBy.id;
                    const iconPath = getIconPath(t.imageName, t.type);
                    const resolvedClass = isResolved ? 'transaction-item--resolved' : '';
                    html += `
                        <div class="transaction-item ${resolvedClass}">
                            <div class="transaction-item__icon">
                                <img src="${iconPath}" alt="${escapeHtml(t.itemName)}" onerror="this.src='../static/drink.svg'">
                            </div>
                            <div class="transaction-item__details">
                                <div class="transaction-item__name">${escapeHtml(t.itemName)}</div>
                                ${t.note ? `<div class="transaction-item__note">${escapeHtml(t.note)}</div>` : ''}
                            </div>
                            <div class="transaction-item__meta">
                                <div class="transaction-item__amount">${formatAmount(t.amount, currency)}</div>
                                <div class="transaction-item__running-balance">${formattedRunningBalance}</div>
                                <div class="transaction-item__date">${formatDate(t.date)}</div>
                            </div>
                        </div>
                    `;
                } else {
                    const allResolved = group.every(t => t.resolvedBy && t.resolvedBy.id);
                    const firstIconPath = getIconPath(group[0].imageName, group[0].type);
                    const resolvedClass = allResolved ? 'transaction-item--resolved' : '';
                    const itemsLabel = (window.__i18n && window.__i18n.t ? window.__i18n.t('history.items', { count: group.length }) : group.length + ' items');
                    html += `
                        <div class="transaction-group">
                            <div class="transaction-group__summary transaction-item ${resolvedClass}" aria-expanded="false">
                                <div class="transaction-item__icon">
                                    <img src="${firstIconPath}" alt="" onerror="this.src='../static/drink.svg'">
                                </div>
                                <div class="transaction-item__details">
                                    <div class="transaction-item__name">${escapeHtml(itemsLabel)}</div>
                                    <div class="transaction-item__note">${(window.__i18n && window.__i18n.t ? window.__i18n.t('history.hover_items') : 'Hover to see individual items')}</div>
                                </div>
                                <div class="transaction-item__meta">
                                    <div class="transaction-item__amount">${formatAmount(groupTotal, currency)}</div>
                                    <div class="transaction-item__running-balance">${formattedRunningBalance}</div>
                                    <div class="transaction-item__date">${formatDate(group[0].date)}</div>
                                </div>
                            </div>
                            <div class="transaction-group__details">
                                ${group.map(t => {
                                    const isResolved = t.resolvedBy && t.resolvedBy.id;
                                    const iconPath = getIconPath(t.imageName, t.type);
                                    const subResolvedClass = isResolved ? 'transaction-item--resolved' : '';
                                    return `
                                        <div class="transaction-item transaction-item--sub ${subResolvedClass}">
                                            <div class="transaction-item__icon">
                                                <img src="${iconPath}" alt="${escapeHtml(t.itemName)}" onerror="this.src='../static/drink.svg'">
                                            </div>
                                            <div class="transaction-item__details">
                                                <div class="transaction-item__name">${escapeHtml(t.itemName)}</div>
                                                ${t.note ? `<div class="transaction-item__note">${escapeHtml(t.note)}</div>` : ''}
                                            </div>
                                            <div class="transaction-item__meta">
                                                <div class="transaction-item__amount">${formatAmount(t.amount, currency)}</div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            html += '</div>';
            content.innerHTML = html;
        }

        function renderError(message) {
            const content = document.getElementById('content');
            var errTitle = (window.__i18n && window.__i18n.t ? window.__i18n.t('history.error_title') : 'Unable to load transactions');
            content.innerHTML = '<div class="error"><div class="error__icon">⚠</div><h2>' + errTitle + '</h2><p>' + escapeHtml(message) + '</p></div>';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getApiBaseUrl() {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8080';
            }
            return 'https://api.bartab.info';
        }

        const DEMO_TOKEN_ID = '00000000-0000-0000-0000-000000000000';

        const DEMO_TRANSACTIONS = [
            { itemName: 'Espresso', imageName: 'coffee', type: 'purchase', amount: -3.50, date: new Date().toISOString(), note: null, resolvedBy: null },
            { itemName: 'Sparkling water', imageName: 'glass', type: 'purchase', amount: -2.50, date: new Date(Date.now() - 900000).toISOString(), note: null, resolvedBy: null },
            { itemName: 'IPA Beer', imageName: 'beer', type: 'purchase', amount: -6.00, date: new Date(Date.now() - 3600000).toISOString(), note: null, resolvedBy: null },
            { itemName: 'Cheese Burger', imageName: 'hamburger', type: 'purchase', amount: -12.00, date: new Date(Date.now() - 3600000).toISOString(), note: 'No onions', resolvedBy: null },
            { itemName: 'Resolved balance', imageName: null, type: 'resolve', amount: 45.00, date: new Date(Date.now() - 86400000).toISOString(), note: null, resolvedBy: null },
            { itemName: 'House Red Wine', imageName: 'wine', type: 'purchase', amount: -8.00, date: new Date(Date.now() - 87000000).toISOString(), note: null, resolvedBy: { id: '1' } },
            { itemName: 'Margherita Pizza', imageName: 'pizza', type: 'purchase', amount: -14.00, date: new Date(Date.now() - 87000000).toISOString(), note: null, resolvedBy: { id: '1' } },
            { itemName: 'Gin & Tonic', imageName: 'gintonic', type: 'purchase', amount: -9.00, date: new Date(Date.now() - 173000000).toISOString(), note: null, resolvedBy: { id: '1' } },
            { itemName: 'Caesar Salad', imageName: 'fruit', type: 'purchase', amount: -10.00, date: new Date(Date.now() - 173500000).toISOString(), note: null, resolvedBy: { id: '1' } }
        ];

        async function loadTransactions() {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenId = urlParams.get('tokenId');

            if (!tokenId) {
                renderError((window.__i18n && window.__i18n.t ? window.__i18n.t('history.error_no_token') : 'No token provided. Please use a valid link to view your transaction history.'));
                return;
            }

            if (tokenId === DEMO_TOKEN_ID) {
                renderTransactions(DEMO_TRANSACTIONS, 'USD', true);
                return;
            }

            try {
                const apiBase = getApiBaseUrl();
                const response = await fetch(`${apiBase}/transactions/history/${encodeURIComponent(tokenId)}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        renderError((window.__i18n && window.__i18n.t ? window.__i18n.t('history.error_not_found') : 'Transaction history not found. The link may have expired or be invalid.'));
                    } else {
                        renderError((window.__i18n && window.__i18n.t ? window.__i18n.t('history.error_server', { status: response.status }) : 'Server error: ' + response.status));
                    }
                    return;
                }

                const data = await response.json();
                const transactions = data.transactions || data;
                const currency = data.currency || 'USD';
                renderTransactions(transactions, currency, false);
            } catch (error) {
                console.error('Error loading transactions:', error);
                renderError((window.__i18n && window.__i18n.t ? window.__i18n.t('history.error_connection') : 'Unable to connect to the server. Please check your internet connection and try again.'));
            }
        }

        var i18nReady = window.__i18n && window.__i18n.ready ? window.__i18n.ready : Promise.resolve();
        document.addEventListener('DOMContentLoaded', function() { i18nReady.then(loadTransactions); });
    </script>
</body>
</html>
