<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - Bartab</title>
    <meta name="description" content="View your Bartab transaction history: purchases, balance changes, and running tab details. Access via your personal link from the app.">
    <link rel="canonical" href="https://bartab.info/history/">
    <meta name="robots" content="noindex, nofollow">
    <link rel="shortcut icon" type="image/x-icon" href="../static/favicon.png">
    <meta name="apple-itunes-app" content="app-id=1602993704">
    <link rel="stylesheet" href="../static/main.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="../index.html" class="nav__logo">Bartab</a>
            <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <ul class="nav__links">
                <li><a href="../index.html" class="nav__link">Home</a></li>
                <li><a href="../app.html" class="nav__link">Download</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="history">
            <div class="container">
                <div class="history__header">
                    <h1>Transaction history</h1>
                    <p>Your purchases and balance changes</p>
                </div>

                <div id="content">
                    <div class="loading">
                        <div class="loading__spinner"></div>
                        <p>Loading transactions...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <div class="container">
            <div class="footer__links">
                <a href="../termsandconditions.html" class="footer__link">Terms & Conditions</a>
                <a href="../privacypolicy.html" class="footer__link">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const toggle = document.querySelector('.nav__toggle');
        const navLinks = document.querySelector('.nav__links');
        
        toggle.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            navLinks.classList.toggle('active');
        });

        // Icon mapping for imageName to SVG files
        const iconMap = {
            // Drinks
            'beer': 'beer.svg',
            'beermug': 'beermug.svg',
            'wine': 'wine.svg',
            'winetaster': 'winetaster.svg',
            'whiskey': 'whiskey.svg',
            'shot': 'shot.svg',
            'cocktail': 'cocktail.svg',
            'cocktail2': 'cocktail2.svg',
            'martini': 'martini.svg',
            'gintonic': 'gintonic.svg',
            'firecocktail': 'firecocktail.svg',
            'coffee': 'coffee.svg',
            'tea': 'tea.svg',
            'teacup': 'teacup.svg',
            'hotchocolate': 'hotchocolate.svg',
            'smoothie': 'smoothie.svg',
            'fruitjuice': 'fruitjuice.svg',
            'energydrink': 'energydrink.svg',
            'colddrink': 'colddrink.svg',
            'coconutdrink': 'coconutdrink.svg',
            'glasswithstraw': 'glasswithstraw.svg',
            'glass': 'glass.svg',
            'drink': 'drink.svg',
            // Food
            'chicken': 'chicken.svg',
            'chips': 'chips.svg',
            'fish': 'fish.svg',
            'fries': 'fries.svg',
            'fruit': 'fruit.svg',
            'hamburger': 'hamburger.svg',
            'hot-dog': 'hot-dog.svg',
            'pizza': 'pizza.svg',
            'pokebowl': 'pokebowl.svg',
            'sandwich': 'sandwich.svg',
            'spaghetti': 'spaghetti.svg',
            'steak': 'steak.svg',
            'taco': 'taco.svg',
            // Balance operations
            'addedBalance': 'addedBalance.svg',
            'removedBalance': 'removedBalance.svg',
            'openingBalance': 'addedBalance.svg'
        };

        function getIconPath(imageName, type) {
            if (type === 'add') {
                return '../static/addedBalance.svg';
            }
            if (type === 'remove') {
                return '../static/removedBalance.svg';
            }
            if (type === 'resolve') {
                return '../static/resolve.svg';
            }

            const iconFile = iconMap[imageName];
            if (iconFile) {
                return `../static/${iconFile}`;
            }

            return '../static/drink.svg';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return date.toLocaleDateString('en-US', options);
        }

        function formatAmount(amount, currency) {
            const prefix = amount > 0 ? '+' : amount < 0 ? '−' : '';
            const formatted = new Intl.NumberFormat(navigator.language, {
                style: 'currency',
                currency: currency
            }).format(Math.abs(amount));
            return `${prefix}${formatted}`;
        }

        function calculateBalance(transactions) {
            return transactions.reduce((sum, t) => sum + t.amount, 0);
        }

        function renderTransactions(transactions, currency) {
            const content = document.getElementById('content');

            if (!transactions || transactions.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                        </div>
                        <h2>No transactions yet</h2>
                        <p>Your transaction history will appear here.</p>
                    </div>
                `;
                return;
            }

            // Transactions are already sorted by the backend

            const balance = calculateBalance(transactions);
            const balanceClass = balance >= 0 ? 'summary-card__balance--positive' : 'summary-card__balance--negative';

            const formattedBalance = new Intl.NumberFormat(navigator.language, {
                style: 'currency',
                currency: currency
            }).format(Math.abs(balance));

            let html = `
                <div class="summary-card">
                    <div class="summary-card__label">Current Balance</div>
                    <div class="summary-card__balance ${balanceClass}">${formattedBalance}</div>
                    <div class="summary-card__count">${transactions.length} transaction${transactions.length !== 1 ? 's' : ''}</div>
                </div>
                <div class="transaction-list">
            `;

            // Calculate running balance (transactions are newest first)
            let runningBalance = balance;

            for (const transaction of transactions) {
                const isResolved = transaction.resolvedBy && transaction.resolvedBy.id;
                const iconPath = getIconPath(transaction.imageName, transaction.type);
                const resolvedClass = isResolved ? 'transaction-item--resolved' : '';
                
                const balanceAfter = runningBalance;
                runningBalance -= transaction.amount; // Move backwards to previous balance
                
                // Use 0 instead of -0 to avoid showing minus sign for zero
                const balanceValue = Math.abs(balanceAfter) < 0.001 ? 0 : balanceAfter;
                const formattedRunningBalance = new Intl.NumberFormat(navigator.language, {
                    style: 'currency',
                    currency: currency
                }).format(balanceValue);

                html += `
                    <div class="transaction-item ${resolvedClass}">
                        <div class="transaction-item__icon">
                            <img src="${iconPath}" alt="${escapeHtml(transaction.itemName)}" onerror="this.src='../static/drink.svg'">
                        </div>
                        <div class="transaction-item__details">
                            <div class="transaction-item__name">${escapeHtml(transaction.itemName)}</div>
                            ${transaction.note ? `<div class="transaction-item__note">${escapeHtml(transaction.note)}</div>` : ''}
                        </div>
                        <div class="transaction-item__meta">
                            <div class="transaction-item__amount">${formatAmount(transaction.amount, currency)}</div>
                            <div class="transaction-item__running-balance">${formattedRunningBalance}</div>
                            <div class="transaction-item__date">${formatDate(transaction.date)}</div>
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            content.innerHTML = html;
        }

        function renderError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="error">
                    <div class="error__icon">⚠</div>
                    <h2>Unable to load transactions</h2>
                    <p>${escapeHtml(message)}</p>
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getApiBaseUrl() {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8080';
            }
            return 'https://api.bartab.info';
        }

        async function loadTransactions() {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenId = urlParams.get('tokenId');

            if (!tokenId) {
                renderError('No token provided. Please use a valid link to view your transaction history.');
                return;
            }

            try {
                const apiBase = getApiBaseUrl();
                const response = await fetch(`${apiBase}/transactions/history/${encodeURIComponent(tokenId)}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        renderError('Transaction history not found. The link may have expired or be invalid.');
                    } else {
                        renderError(`Server error: ${response.status}`);
                    }
                    return;
                }

                const data = await response.json();
                const transactions = data.transactions || data;
                const currency = data.currency || 'USD';
                renderTransactions(transactions, currency);
            } catch (error) {
                console.error('Error loading transactions:', error);
                renderError('Unable to connect to the server. Please check your internet connection and try again.');
            }
        }

        document.addEventListener('DOMContentLoaded', loadTransactions);
    </script>
</body>
</html>
