<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWT1359JT0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FWT1359JT0');
    </script>
    <title>Email Confirmation - Bartab</title>
    <meta name="description" content="Email confirmation for Bartab.">
    <link rel="canonical" href="https://bartab.info/email-confirmation.html">
    <meta name="robots" content="noindex, nofollow">
    <link rel="shortcut icon" type="image/x-icon" href="static/favicon.png">
    <meta name="apple-itunes-app" content="app-id=1602993704">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bartab.info/email-confirmation.html">
    <meta property="og:title" content="Welcome to Bartab!">
    <meta property="og:description" content="Your account has been successfully created.">
    
    <link rel="stylesheet" href="static/main.css">
    <style>
        .confirmation {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl);
        }
        
        .confirmation__card {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: var(--space-2xl);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .confirmation__icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 0 auto var(--space-lg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .confirmation__icon--success {
            background-color: var(--color-success);
        }
        
        .confirmation__icon--error {
            background-color: var(--color-error);
        }
        
        .confirmation__icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        
        .confirmation__card h1 {
            font-size: 1.5rem;
            margin-bottom: var(--space-sm);
        }
        
        .confirmation__card p {
            margin-bottom: var(--space-xl);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="nav__logo">Bartab</a>
            <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <ul class="nav__links">
                <li><a href="index.html" class="nav__link" data-i18n="nav.home">Home</a></li>
                <li><a href="app.html" class="nav__link" data-i18n="nav.download">Download</a></li>
                <li id="lang-switcher"></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="confirmation">
            <!-- Success state -->
            <div class="confirmation__card hidden" id="success-view">
                <div class="confirmation__icon confirmation__icon--success">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                
                <h1 data-i18n="email_confirm.success_title">Email confirmed</h1>
                <p id="success-message" data-i18n="email_confirm.success_text">Your email has been verified. You can now sign in to your Bartab account.</p>
                
                <a href="https://open.bartab.info/app" class="btn btn--primary" data-i18n="email_confirm.open_app">Open Bartab</a>
            </div>
            
            <!-- Error state -->
            <div class="confirmation__card hidden" id="error-view">
                <div class="confirmation__icon confirmation__icon--error">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </div>
                
                <h1 data-i18n="email_confirm.error_title">Link expired</h1>
                <p data-i18n="email_confirm.error_text">This confirmation link has expired. Please request a new confirmation email from the app.</p>
                
                <a href="https://open.bartab.info/app" class="btn btn--primary" data-i18n="email_confirm.open_app">Open Bartab</a>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <div class="container">
            <div class="footer__links">
                <a href="termsandconditions.html" class="footer__link" data-i18n="footer.terms">Terms & Conditions</a>
                <a href="privacypolicy.html" class="footer__link" data-i18n="footer.privacy">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <script src="static/i18n.js"></script>
    <script>
        // Mobile menu toggle
        const toggle = document.querySelector('.nav__toggle');
        const navLinks = document.querySelector('.nav__links');
        
        toggle.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            navLinks.classList.toggle('active');
        });
        
        // Handle email confirmation state
        function handleEmailConfirmation() {
            const urlParams = new URLSearchParams(window.location.search);
            const errorCode = urlParams.get('error_code');
            
            if (errorCode === 'otp_expired') {
                document.getElementById('error-view').classList.remove('hidden');
            } else {
                document.getElementById('success-view').classList.remove('hidden');
            }

            // Append PKCE token to Open Bartab links so the app can continue the flow (Supabase uses ?token=...)
            const pkceToken = urlParams.get('token') || urlParams.get('code') || urlParams.get('pkce_token');
            const openBartabUrl = 'https://open.bartab.info/app';
            document.querySelectorAll('a[href="' + openBartabUrl + '"]').forEach(function (link) {
                if (pkceToken) {
                    const target = new URL(openBartabUrl);
                    target.searchParams.set('token', pkceToken);
                    link.href = target.toString();
                }
            });
        }
        
        handleEmailConfirmation();
    </script>
</body>
</html>
