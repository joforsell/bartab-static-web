<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWT1359JT0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FWT1359JT0');
    </script>
    <title>Password Updated - Bartab</title>
    <meta name="description" content="Your password has been updated.">
    <link rel="canonical" href="https://bartab.info/password-success.html">
    <meta name="robots" content="noindex, nofollow">
    <link rel="shortcut icon" type="image/x-icon" href="static/favicon.png">
    <meta name="apple-itunes-app" content="app-id=1602993704">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bartab.info/password-success.html">
    <meta property="og:title" content="Password Updated - Bartab">
    <meta property="og:description" content="Your password has been successfully updated.">
    
    <link rel="stylesheet" href="static/main.css">
    <style>
        .confirmation {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-xl);
        }
        
        .confirmation__card {
            background-color: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: var(--space-2xl);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .confirmation__icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--color-success);
            margin: 0 auto var(--space-lg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .confirmation__icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        
        .confirmation__card h1 {
            font-size: 1.5rem;
            margin-bottom: var(--space-sm);
        }
        
        .confirmation__card p {
            margin-bottom: var(--space-xl);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="nav__logo">Bartab</a>
            <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <ul class="nav__links">
                <li><a href="index.html" class="nav__link">Home</a></li>
                <li><a href="app.html" class="nav__link">Download</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="confirmation">
            <div class="confirmation__card">
                <div class="confirmation__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                
                <h1>Password updated</h1>
                <p>Your password has been changed. You can now sign in with your new password.</p>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <div class="container">
            <div class="footer__links">
                <a href="termsandconditions.html" class="footer__link">Terms & Conditions</a>
                <a href="privacypolicy.html" class="footer__link">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const toggle = document.querySelector('.nav__toggle');
        const navLinks = document.querySelector('.nav__links');
        
        toggle.addEventListener('click', () => {
            const expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
